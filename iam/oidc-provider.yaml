AWSTemplateFormatVersion: "2010-09-09"
Description: OIDC-Provider

Parameters:
  ProviderUrl:
    Type: String
    Description: URL of the OIDC provider
    Default: 
Resources:
  OIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !Ref ProviderUrl
      ClientIDList:
        - sts.amazonaws.com
      ThumbprintList:
        - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280
