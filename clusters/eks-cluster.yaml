AWSTemplateFormatVersion: "2010-09-09"
Description: "EKS Cluster with Integrated OIDC Provider"

Parameters:
  ClusterName:
    Description: EKS Cluster name
    Type: String
    Default: aurascale-control-plane

  VpcStackName:
    Description: Name of the VPC stack to import values from
    Type: String
    Default: aurascale-vpc

  IamStackName:
    Description: Name of the IAM stack to import values from
    Type: String
    Default: aurascale-iam

  Environment:
    Description: The environment name
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod

Resources:
  # 1. The Security Group "Shell"
  EKSClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Cluster communication with worker nodes
      VpcId: !ImportValue "aurascale-vpcid"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS traffic to EKS API server
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-cluster-sg"

  # 2. THE FIX: The Standalone Ingress Rule
  # This resource "waits" for the shell above to exist, then attaches the rule.
  EKSClusterIngressRule:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EKSClusterSecurityGroup # The target
      IpProtocol: "-1"
      FromPort: -1
      ToPort: -1
      SourceSecurityGroupId: !Ref EKSClusterSecurityGroup # The source
      Description: Allow all traffic within the cluster security group

  # 3. The Cluster (Depends on the Shell)
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      RoleArn: !ImportValue 
        Fn::Sub: "${IamStackName}-EksClusterRoleArn"
      Version: "1.31"
      ResourcesVpcConfig:
        EndpointPrivateAccess: true
        EndpointPublicAccess: true
        SecurityGroupIds:
          - !Ref EKSClusterSecurityGroup
        SubnetIds:
          - !ImportValue "aurascale-private-subnet-id"
          - !ImportValue "aurascale-private-subnet-2-id"
          - !ImportValue "aurascale-private-subnet-3-id"
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator

  # 4. The OIDC Provider (Depends on the Cluster)
  OIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !GetAtt EKSCluster.OpenIdConnectIssuerUrl
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 2b18947a6a9fc7764fd8b5fb18a863b0c6dac24f

Outputs:
  # --- YOUR ORIGINAL OUTPUTS ---
  EKSClusterName:
    Description: EKS Cluster Name
    Value: !Ref EKSCluster
    Export:
      Name: !Sub "${AWS::StackName}-EKSClusterName"

  EKSClusterArn:
    Description: EKS Cluster ARN
    Value: !GetAtt EKSCluster.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EKSClusterArn"

  EKSClusterEndpoint:
    Description: EKS Cluster Endpoint
    Value: !GetAtt EKSCluster.Endpoint
    Export:
      Name: !Sub "${AWS::StackName}-EKSClusterEndpoint"

  EKSClusterSecurityGroupId:
    Description: EKS Cluster Security Group ID
    Value: !Ref EKSClusterSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-EKSClusterSecurityGroupId"

  # --- NEW: OIDC PROVIDER OUTPUT ---
  OIDCProviderArn:
    Description: ARN of the OIDC Provider
    Value: !Ref OIDCProvider
    Export:
      Name: !Sub "${AWS::StackName}-OIDCProviderArn"